name: Report a domain
description: Report a dead, malicious, or incorrect domain listing
title: "Report: "
labels: ["domain-report"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a problem with an existing domain in the registry.

        **For urgent security issues** (phishing, active malware), email security@arcede.com directly.

  - type: input
    id: domain
    attributes:
      label: Domain
      description: The domain you're reporting
      placeholder: example.com
    validations:
      required: true

  - type: dropdown
    id: reason
    attributes:
      label: Reason for report
      options:
        - Dead / unreachable — The domain no longer resolves or returns errors
        - Malicious — Phishing, malware, or harmful content
        - Impersonation — The listing impersonates another service
        - Incorrect status — Marked as verified but doesn't host agent.json (or vice versa)
        - Incorrect metadata — Display name, description, or pricing is wrong
        - Spam — The domain was submitted to game the registry
        - Removal request — I own this domain and want it delisted
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What specifically is wrong? Include URLs, screenshots, or error messages if relevant.
      placeholder: |
        The domain returns a 404 error when I visit it.
        Last working: approximately 2 weeks ago.
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Low — Incorrect data, can wait for next crawl
        - Medium — Domain is dead, should be removed within a week
        - High — Malicious content, needs immediate removal
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have verified this domain is actually in the registry
          required: true
        - label: I am reporting in good faith (not to harm a competitor)
          required: true
